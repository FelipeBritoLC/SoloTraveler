{% extends "base.html" %}
{% load i18n %}
{% block main_class %}narrow{% endblock %}
{% block content %}
<div class="page-heading">
    <span class="eyebrow">{% trans "Atividade" %}</span>
    <h1>{% if object %}{% trans "Editar atividade" %}{% else %}{% trans "Nova atividade" %}{% endif %}</h1>
</div>
<div class="card form-card">
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="btn btn-block" type="submit">{% trans "Salvar" %}</button>
    </form>
</div>
{% endblock %}
