{% extends "base.html" %}
{% load i18n %}
{% block main_class %}narrow{% endblock %}
{% block content %}
<div class="page-heading">
    <span class="eyebrow">{% trans "Viagem" %}</span>
    <h1>{% if object %}{% trans "Editar viagem" %}{% else %}{% trans "Nova viagem" %}{% endif %}</h1>
</div>
<div class="card form-card">
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="btn btn-block" type="submit">{% trans "Salvar" %}</button>
    </form>
</div>
{% endblock %}
